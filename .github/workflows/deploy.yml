name: CI/CD (ACR build + WebApp deploy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_NAME: coursepredacr123
  IMAGE_NAME: courseprediction
  WEBAPP_NAME: coursepred-webapp-xyz
  RESOURCE_GROUP: predictioncourse_group
  EXPOSED_PORT: "8501"
  DOCKERFILE_PATH: "./Dockerfile"

jobs:
  build:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.meta.outputs.REPO }}
      reg:  ${{ steps.meta.outputs.REG }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Compute coords
        id: meta
        run: |
          echo "REG=${ACR_NAME}.azurecr.io" >> $GITHUB_OUTPUT
          echo "REPO=${ACR_NAME}.azurecr.io/${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push (tag=SHA7)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.REPO }}:${{ steps.meta.outputs.TAG }}
          provenance: false
             # ⬇️ Ajouts clés
          no-cache: true                 # force un build frais (une seule fois)
          build-args: |                  # passe le SHA au Dockerfile
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure Web App (pin to digest)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production       # ou staging avec approbation GitHub
      url: https://${{ env.WEBAPP_NAME }}.azurewebsites.net
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: App settings (port + disable ACR CD)
        run: |
          az webapp config appsettings set \
            -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME" \
            --settings DOCKER_ENABLE_CI=false WEBSITES_PORT=${EXPOSED_PORT}

      - name: Use Managed Identity for ACR pulls
        run: |
          az resource update \
            -g "$RESOURCE_GROUP" \
            -n "$WEBAPP_NAME" \
            --resource-type "Microsoft.Web/sites/config" \
            --set properties.acrUseManagedIdentityCreds=true
      - name: Ensure system-assigned identity is ON
        run: az webapp identity assign -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME"
        
      - name: Grant AcrPull to WebApp identity (idempotent + retry)
        shell: bash
        env:
          RG: ${{ env.RESOURCE_GROUP }}
          WEBAPP: ${{ env.WEBAPP_NAME }}
          ACR: ${{ env.ACR_NAME }}
        run: |
          set -euo pipefail
          az account show -o table
          ACR_ID=$(az acr show -n "$ACR" --query id -o tsv)
          PRINCIPAL_ID=$(az webapp identity show -g "$RG" -n "$WEBAPP" --query principalId -o tsv)
          if [ -z "$PRINCIPAL_ID" ]; then
             echo "WebApp identity principalId introuvable. Réessaie après 30s."
             exit 1
          fi
          HAS=$(az role assignment list \
           --assignee "$PRINCIPAL_ID" \
           --scope "$ACR_ID" \
           --query "[?roleDefinitionName=='AcrPull'] | length(@)" -o tsv)

          if [ "$HAS" != "0" ]; then
             echo "AcrPull est déjà attribué. OK."
             exit 0
          fi
          for i in {1..8}; do
            set +e
            az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role AcrPull \
              --scope "$ACR_ID"
            RC=$?
            set -e

            if [ $RC -eq 0 ]; then
                 echo "AcrPull attribué."
                 break
            fi

            echo "Tentative $i/8 a échoué (code=$RC). Attente 15s et on réessaie…"
            sleep 15
          done
          HAS=$(az role assignment list \
             --assignee "$PRINCIPAL_ID" \
             --scope "$ACR_ID" \
             --query "[?roleDefinitionName=='AcrPull'] | length(@)" -o tsv)
          if [ "$HAS" = "0" ]; then
             echo "::error::Impossible d'attribuer AcrPull. Vérifie que l'identity du workflow possède le rôle 'User Access Administrator' ou 'Owner' au scope $ACR_ID"
             echo "Astuce: lance ce job avec un principal qui a ces droits, ou fais l'assignation une fois via le Portail Azure."
          exit 1
          fi
          echo "AcrPull OK."
      - name: Point Web App to image@digest
        run: |
          az webapp config container set \
            -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME" \
            --container-image-name "${{ needs.build.outputs.repo }}@${{ needs.build.outputs.digest }}" \
            --container-registry-url "https://${{ needs.build.outputs.reg }}"
            # (si supporté) --acr-identity system

      - name: Restart
        run: az webapp restart -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME"

      - name: Verify
        run: |
          echo "Expecting ${{ needs.build.outputs.repo }}@${{ needs.build.outputs.digest }}"
          az webapp show -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME" --query siteConfig.linuxFxVersion -o tsv
