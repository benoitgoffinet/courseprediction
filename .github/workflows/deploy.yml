# .github/workflows/deploy.yml
name: Build & Deploy to Azure Web App (Container, digest + Managed Identity)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Empêche les déploiements qui se chevauchent
concurrency:
  group: deploy-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

# ====== Paramètres à adapter ======
env:
  ACR_NAME: coursepredacr123                 # Nom ACR (sans .azurecr.io)
  IMAGE_NAME: courseprediction               # Repo d'image dans l'ACR
  WEBAPP_NAME: coursepred-webapp-xyz         # Nom de la Web App (Linux, container)
  RESOURCE_GROUP: predictioncourse_group     # Resource group de la Web App
  SLOT_NAME: ""                              # ex: "staging" si slot, sinon laisser vide
  EXPOSED_PORT: "8501"                       # Port exposé par le conteneur
  DOCKERFILE_PATH: "./Dockerfile"            # Chemin Dockerfile
# ===================================

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # permet OIDC avec azure/login si tu bascules un jour

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: false

      - name: ACR login (for docker push)
        run: az acr login --name "$ACR_NAME"

      - name: Compute image coordinates
        id: meta
        run: |
          echo "REG=${ACR_NAME}.azurecr.io" >> $GITHUB_OUTPUT
          echo "REPO=${ACR_NAME}.azurecr.io/${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & push (on récupère le digest depuis l'output de l'action)
      - name: Build & Push image (tag = SHA7)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.REPO }}:${{ steps.meta.outputs.TAG }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # App settings utiles : désactiver webhooks ACR + fixer le port + MLflow
      - name: Set App Settings
        run: |
          az webapp config appsettings set \
            -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME" ${SLOT_NAME:+--slot "$SLOT_NAME"} \
            --settings \
              DOCKER_ENABLE_CI=false \
              WEBSITES_PORT=${EXPOSED_PORT} \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              USE_AZURE_MLFLOW=1 \
              MLFLOW_TRACKING_URI="azureml://canadacentral.api.azureml.ms/mlflow/v1.0/subscriptions/b115f392-8b15-499a-a548-edd84815dbcb/resourceGroups/predictioncourse_group/providers/Microsoft.MachineLearningServices/workspaces/courseapied-ws"

      # Forcer l'usage de l'identité managée pour tirer depuis l'ACR
      - name: Use Managed Identity for ACR pulls
        run: |
          az resource update \
            -g "$RESOURCE_GROUP" \
            -n "$WEBAPP_NAME" \
            --resource-type "Microsoft.Web/sites/config" \
            --set properties.acrUseManagedIdentityCreds=true

      # Pointer la Web App vers l'image par DIGEST (aucun user/pass ACR)
      - name: Configure Web App container (pin to digest)
        run: |
          az webapp config container set \
            -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME" ${SLOT_NAME:+--slot "$SLOT_NAME"} \
            --container-image-name "${{ steps.meta.outputs.REPO }}@${{ steps.build.outputs.digest }}" \
            --container-registry-url "https://${{ steps.meta.outputs.REG }}"
            # Si ta version du CLI le supporte, ajoute: --acr-identity system

      - name: Restart Web App
        run: az webapp restart -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME" ${SLOT_NAME:+--slot "$SLOT_NAME"}

      - name: Show effective container config
        run: |
          echo "Expecting: ${{ steps.meta.outputs.REPO }}@${{ steps.build.outputs.digest }}"
          az webapp show -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME" ${SLOT_NAME:+--slot "$SLOT_NAME"} --query siteConfig.linuxFxVersion -o tsv
          az webapp config container show -g "$RESOURCE_GROUP" -n "$WEBAPP_NAME" ${SLOT_NAME:+--slot "$SLOT_NAME"}
